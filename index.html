<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素記号チャレンジ Ver.2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🧪 元素記号チャレンジ Ver.2</h1>

    <h2 id="questionNumber">問題 1 / 20</h2>

    <div id="question" class="question">
        元素名
    </div>

    <p class="notice">
        ※元素記号は<strong>大文字・小文字を正確に入力</strong>してください。<br>
        例：Na、Mg、Cl
    </p>

   <input
    type="text"
    id="answer"
    placeholder="元素記号を入力"
    autocomplete="off"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false"
    maxlength="2"
    autofocus>

    <br><br>

    <button id="submitButton">決定</button>

    <div id="message"></div>

    <h3 id="score">得点：0</h3>

</div>

<script src="script.js"></script>

</body>
</html>
